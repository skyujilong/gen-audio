<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>生成 · gen-audio</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components.css" />
</head>
<body>
  <nav class="top-nav">
    <a href="/draw" class="active">生成</a>
    <a href="/favorites">列表</a>
    <a href="/synthesize">合成</a>
  </nav>
  <h1>🔊 生成</h1>
  <p class="muted">调整参数 + 选音色 → 生成试听 → 收藏或去合成。</p>

  <div class="panel-grid">
    <!-- 左栏：参数面板 + 试听文本 + 试听/生成按钮 -->
    <div class="col-left">
      <div id="param-host"></div>

      <div class="form-section">
        <h3>📝 试听文本</h3>
        <textarea id="f-demo-text" rows="3">你好，这是一段声音测试。</textarea>
      </div>

      <div style="margin: 16px 0; text-align: center;">
        <button id="draw-btn" style="font-size: 16px; padding: 12px 32px;">🔊 生成</button>
      </div>
    </div>

    <!-- 右栏：音色选择 + 生成结果 -->
    <div class="col-right">
      <!-- 音色模块 -->
      <div class="form-section">
        <h3>🎤 音色</h3>
        <div id="speaker-display" style="margin-bottom: 8px;">
          <!-- 由 draw.js 注入 renderSpeakerTag -->
        </div>
        <div class="btn-group">
          <button id="rand-speaker-btn" class="secondary" type="button">🎲 随机</button>
          <button id="load-speaker-btn" class="secondary" type="button">📚 加载</button>
          <button id="save-speaker-btn" class="secondary" type="button" disabled>💾 保存</button>
        </div>
        <p class="text-xs text-muted mt-8">
          随机：拿一次性音色（不存库）；保存：把当前音色命名入库；加载：从库里选。
        </p>
      </div>

      <!-- 生成结果 -->
      <div id="card-panel" class="form-section hidden">
        <h3>
          <span>🎵 试听</span>
          <span class="hint" id="card-id-label"></span>
        </h3>
        <div class="row" style="margin-bottom: 8px;">
          <input type="text" id="card-name" placeholder="参数名" style="flex: 1;" />
          <button id="fav-btn" class="secondary">☆ 收藏</button>
        </div>
        <audio id="audio" controls></audio>
        <p class="text-muted text-sm" id="subtitle-display"></p>
        <p class="text-muted text-xs" id="params-summary"></p>
        <div class="row mt-8">
          <a id="to-synthesize" class="tag" style="cursor:pointer">🎤 去合成</a>
          <button id="discard-btn" class="danger" style="margin-left:auto">🗑 丢弃</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/draw.js"></script>
</body>
</html>
