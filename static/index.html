<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>gen-audio</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <nav class="top-nav">
    <a href="/draw">生成</a>
    <a href="/favorites">列表</a>
    <a href="/synthesize">合成</a>
  </nav>
  <h1>gen-audio</h1>
  <p class="muted">本地单用户 TTS「生成 + 批量合成」工具，基于 2noise/ChatTTS。</p>

  <div class="card">
    <h2>使用流程</h2>
    <ol style="padding-left: 20px; line-height: 1.8;">
      <li>去 <a href="/draw">生成</a> 点 🔊 生成 → 试听 demo → ⭐ 收藏 / 🗑 丢弃</li>
      <li>去 <a href="/synthesize">合成</a> 选卡 + 输入文本 → 批量提交 → 等合成完 → 试听 / 下载</li>
      <li>去 <a href="/favorites">列表</a> 查看所有参数卡，tab 切收藏</li>
    </ol>
  </div>

  <script type="module">
    import { api } from '/js/api.js';
    try {
      const h = await api('GET', '/health');
      if (!h.model_loaded) {
        document.body.insertAdjacentHTML('beforeend',
          `<p class="muted" style="margin-top:24px">⏳ ChatTTS 模型加载中...首次启动需要 5-15 秒</p>`);
      }
    } catch (e) { /* toast already shown */ }
  </script>
</body>
</html>
